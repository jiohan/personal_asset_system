openapi: 3.0.3
info:
  title: Personal Asset Management API
  version: 0.2.0-mvp
  description: |
    MVP API contract aligned with PERSONAL_ASSET_PWA_GUIDE.md sections 8~14.
servers:
  - url: /api/v1

security:
  - sessionCookie: []

tags:
  - name: Auth
  - name: Accounts
  - name: Transactions
  - name: Reports
  - name: Imports
  - name: Backups
  - name: Categories

paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: Sign up
      security: []
      # Slice1 hardening: CSRF header is required for POST (cookie-based XSRF).
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSignupRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      # Slice1 hardening: CSRF header is required for POST (cookie-based XSRF).
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/csrf:
    get:
      tags: [Auth]
      summary: CSRF bootstrap (sets XSRF-TOKEN cookie)
      security: []
      responses:
        '204':
          description: No Content

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/me:
    get:
      tags: [Auth]
      summary: Current user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts:
    get:
      tags: [Accounts]
      summary: List accounts
      description: |
        MVP Slice2 returns both active and inactive accounts.
        Clients may hide inactive entries by default.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Accounts]
      summary: Create account
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /accounts/{id}:
    patch:
      tags: [Accounts]
      summary: Update account
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountPatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      parameters:
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/Type'
        - $ref: '#/components/parameters/CategoryId'
        - $ref: '#/components/parameters/NeedsReview'
        - $ref: '#/components/parameters/SearchQ'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTransactionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Transactions]
      summary: Create transaction
      description: |
        Current implementation status:
        - INCOME/EXPENSE/TRANSFER creation is supported.
        - TRANSFER requires fromAccountId/toAccountId (accountId must be null).
        - TRANSFER does not accept categoryId (must be null).
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Transactions]
      summary: Update transaction
      description: |
        MVP rule: `type` update is not allowed. To change type, delete and recreate.
        TRANSFER updates are supported, but category is always stored as null.
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionPatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Transactions]
      summary: Soft-delete transaction
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/CsrfTokenHeader'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /reports/summary:
    get:
      tags: [Reports]
      summary: Summary report
      description: |
        Date range is inclusive: includes transactions where `from <= txDate <= to`.
      parameters:
        - $ref: '#/components/parameters/FromDateRequired'
        - $ref: '#/components/parameters/ToDateRequired'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /reports/transfers:
    get:
      tags: [Reports]
      summary: Transfer report grouped by account pair
      description: |
        Date range is inclusive: includes transactions where `from <= txDate <= to`.
      parameters:
        - $ref: '#/components/parameters/FromDateRequired'
        - $ref: '#/components/parameters/ToDateRequired'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /reports/cashflow:
    get:
      tags: [Reports]
      summary: Daily cashflow trend
      description: |
        Date range is inclusive: includes transactions where `from <= txDate <= to`.
        `expense` excludes transactions where `excludeFromReports=true`.
        `transfer` is reported separately and is not included in `net`.
      parameters:
        - $ref: '#/components/parameters/FromDateRequired'
        - $ref: '#/components/parameters/ToDateRequired'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashflowTrendResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /reports/categories/top-expense:
    get:
      tags: [Reports]
      summary: Top expense categories
      description: |
        Date range is inclusive: includes transactions where `from <= txDate <= to`.
        Returns up to `limit` categories ordered by amount descending, then transaction count descending.
        Uncategorized expenses are returned with `categoryId=null`.
      parameters:
        - $ref: '#/components/parameters/FromDateRequired'
        - $ref: '#/components/parameters/ToDateRequired'
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 6
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopExpenseCategoriesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /reports/balances:
    get:
      tags: [Reports]
      summary: Daily account balance trend
      description: |
        Date range is inclusive: includes daily balance points where `from <= date <= to`.
        `currentBalance` in each account series matches the last balance point in the requested range.
      parameters:
        - $ref: '#/components/parameters/FromDateRequired'
        - $ref: '#/components/parameters/ToDateRequired'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalanceTrendResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /imports/csv:
    post:
      tags: [Imports]
      summary: CSV one-shot import
      description: |
        MVP Slice 6 rules:
        - One request performs parse -> validate -> dedupe(skip) -> save.
        - Any row-level error rejects the entire import with 422 and no rows are saved.
        - Current implementation supports INCOME/EXPENSE imports only.
        - `mapping` is a JSON string matching `CsvImportMappingPayload`.
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, mapping]
              properties:
                file:
                  type: string
                  format: binary
                mapping:
                  type: string
                  description: JSON string for column/account mapping.
                  example: '{"columns":{"txDate":"Date","amount":"Amount","description":"Description","account":"Account","type":"Type"},"accountNameMap":{"Main Checking":1},"defaultType":"EXPENSE"}'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsvImportResultResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /backups/export:
    get:
      tags: [Backups]
      summary: Export backup v1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupV1Document'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /backups/import:
    post:
      tags: [Backups]
      summary: Import backup v1 (replace-all)
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupImportResultResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /categories:
    get:
      tags: [Categories]
      summary: List categories
      parameters:
        - in: query
          name: type
          required: false
          schema:
            $ref: '#/components/schemas/TransactionType'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Categories]
      summary: Create user category
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /categories/{id}:
    patch:
      tags: [Categories]
      summary: Update user category
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryPatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: JSESSIONID

  parameters:
    PathId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
    CsrfTokenHeader:
      in: header
      name: X-XSRF-TOKEN
      required: false
      schema:
        type: string
      description: |
        CSRF token header for session-cookie auth.
        Server sets cookie `XSRF-TOKEN` and the client should echo it in this header for mutating requests.
        MVP (same-origin + session cookie) expects this header for POST/PATCH/DELETE.
    FromDate:
      in: query
      name: from
      required: false
      schema:
        type: string
        format: date
    ToDate:
      in: query
      name: to
      required: false
      schema:
        type: string
        format: date
    FromDateRequired:
      in: query
      name: from
      required: true
      schema:
        type: string
        format: date
    ToDateRequired:
      in: query
      name: to
      required: true
      schema:
        type: string
        format: date
    AccountId:
      in: query
      name: accountId
      required: false
      schema:
        type: integer
        format: int64
    Type:
      in: query
      name: type
      required: false
      schema:
        $ref: '#/components/schemas/TransactionType'
    CategoryId:
      in: query
      name: categoryId
      required: false
      schema:
        type: integer
        format: int64
    NeedsReview:
      in: query
      name: needsReview
      required: false
      schema:
        type: boolean
    SearchQ:
      in: query
      name: q
      required: false
      schema:
        type: string
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    Size:
      in: query
      name: size
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    Sort:
      in: query
      name: sort
      required: false
      schema:
        type: string
        default: txDate,desc

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Conflict:
      description: Domain conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'

  schemas:
    ApiErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            fieldErrors:
              type: array
              items:
                $ref: '#/components/schemas/FieldError'
      example:
        error:
          code: VALIDATION_ERROR
          message: Invalid request.
          fieldErrors:
            - field: email
              reason: must be a well-formed email address
    FieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
        reason:
          type: string

    TransactionType:
      type: string
      enum: [INCOME, EXPENSE, TRANSFER]

    AccountType:
      type: string
      enum: [CHECKING, SAVINGS, CASH, INVESTMENT]

    SourceType:
      type: string
      enum: [MANUAL, CSV]

    AuthSignupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      example:
        email: demo@example.com
        password: demo-password
    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
      example:
        email: demo@example.com
        password: demo
    AuthMeResponse:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
      example:
        id: 1
        email: demo@example.com

    AccountCreateRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          maxLength: 100
        type:
          $ref: '#/components/schemas/AccountType'
        isActive:
          type: boolean
          default: true
        orderIndex:
          type: integer
        openingBalance:
          type: integer
          format: int64
          minimum: 0
    AccountPatchRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        isActive:
          type: boolean
        orderIndex:
          type: integer
    AccountResponse:
      type: object
      required: [id, name, type, isActive, openingBalance]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          $ref: '#/components/schemas/AccountType'
        isActive:
          type: boolean
        orderIndex:
          type: integer
          nullable: true
        openingBalance:
          type: integer
          format: int64
        currentBalance:
          type: integer
          format: int64
          nullable: true
          description: |
            Derived value from openingBalance and non-deleted transactions.
    AccountListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'

    TransactionCreateRequest:
      type: object
      required: [txDate, type, amount]
      properties:
        txDate:
          type: string
          format: date
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: integer
          format: int64
          minimum: 1
        accountId:
          type: integer
          format: int64
          nullable: true
        fromAccountId:
          type: integer
          format: int64
          nullable: true
        toAccountId:
          type: integer
          format: int64
          nullable: true
        description:
          type: string
          default: ''
        categoryId:
          type: integer
          format: int64
          nullable: true
        tagNames:
          type: array
          items:
            type: string
            maxLength: 30
        needsReview:
          type: boolean
          default: false
        excludeFromReports:
          type: boolean
          default: false
      description: |
        Rules:
        - amount is always positive KRW integer.
        - TRANSFER uses fromAccountId/toAccountId and accountId must be null.
        - INCOME/EXPENSE uses accountId and from/to must be null.
        - referenced account must be active.
        - For INCOME/EXPENSE: categoryId null => server stores needsReview=true.
        - For TRANSFER: categoryId must be null; needsReview is not forced by the server.
        - type != EXPENSE => server stores excludeFromReports=false.
    TransactionPatchRequest:
      type: object
      description: |
        Partial update for non-type fields.
        MVP: type update is disallowed.
        Any referenced account/category must remain active.
      properties:
        txDate:
          type: string
          format: date
        amount:
          type: integer
          format: int64
          minimum: 1
        accountId:
          type: integer
          format: int64
          nullable: true
        fromAccountId:
          type: integer
          format: int64
          nullable: true
        toAccountId:
          type: integer
          format: int64
          nullable: true
        description:
          type: string
        clearCategory:
          type: boolean
          default: false
          description: |
            When true, clears categoryId (stores categoryId as null). Used to distinguish
            between "omit categoryId" (no change) and "clear category".
        categoryId:
          type: integer
          format: int64
          nullable: true
        tagNames:
          type: array
          items:
            type: string
            maxLength: 30
        needsReview:
          type: boolean
        excludeFromReports:
          type: boolean
    TransactionResponse:
      type: object
      required:
        - id
        - txDate
        - type
        - amount
        - description
        - needsReview
        - excludeFromReports
        - source
      properties:
        id:
          type: integer
          format: int64
        txDate:
          type: string
          format: date
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: integer
          format: int64
        accountId:
          type: integer
          format: int64
          nullable: true
        fromAccountId:
          type: integer
          format: int64
          nullable: true
        toAccountId:
          type: integer
          format: int64
          nullable: true
        description:
          type: string
        categoryId:
          type: integer
          format: int64
          nullable: true
        tagNames:
          type: array
          items:
            type: string
        needsReview:
          type: boolean
        excludeFromReports:
          type: boolean
        source:
          $ref: '#/components/schemas/SourceType'
        deletedAt:
          type: string
          format: date-time
          nullable: true
    PagedTransactionResponse:
      type: object
      required: [items, page, size, totalElements]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TransactionResponse'
        page:
          type: integer
        size:
